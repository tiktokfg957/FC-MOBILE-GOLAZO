<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ-панель FC MOBILE GOLAZO</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #0A0A0A; color: #FFFFFF; }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        h1 { font-size: 2.5rem; font-weight: 800; margin-bottom: 30px; color: #00FF85; }
        .login-box { max-width: 400px; margin: 100px auto; background: rgba(20,20,20,0.9); padding: 30px; border-radius: 20px; border: 1px solid rgba(0,255,133,0.3); }
        .login-box input { width: 100%; margin-bottom: 15px; padding: 12px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.2); border-radius: 12px; color: white; }
        .login-btn { background: #00FF85; border: none; padding: 12px; width: 100%; border-radius: 40px; font-weight: 700; cursor: pointer; }
        .order-list { margin-top: 20px; }
        .order-item { background: rgba(20,20,20,0.8); border: 1px solid rgba(0,255,133,0.2); border-radius: 16px; padding: 20px; margin-bottom: 15px; }
        .order-item h3 { margin-bottom: 10px; color: #00FF85; }
        .order-item p { margin: 5px 0; color: #AAAAAA; }
        .actions { margin-top: 12px; display: flex; gap: 10px; flex-wrap: wrap; }
        .actions button { padding: 8px 18px; border-radius: 20px; font-weight: 600; cursor: pointer; border: none; }
        .approve-btn { background: #00FF85; color: #000; }
        .reject-btn { background: #FF4D6A; color: #fff; }
        .generate-code-btn { background: #00BFFF; color: #fff; }
        .topup-done-btn { background: #FFB800; color: #000; }
        .logout-btn { background: rgba(255,255,255,0.1); color: white; border: 1px solid white; padding: 8px 18px; border-radius: 20px; cursor: pointer; float: right; }
    </style>
</head>
<body>
    <div class="container" id="app">
        <div id="loginScreen" class="login-box">
            <h2 style="text-align:center;">Вход для администратора</h2>
            <input type="text" id="adminLogin" placeholder="Логин" value="admin">
            <input type="password" id="adminPass" placeholder="Пароль" value="admin123">
            <button class="login-btn" id="loginBtn">Войти</button>
        </div>
        <div id="adminPanel" style="display:none;">
            <button class="logout-btn" id="logoutBtn">Выйти</button>
            <h1>Заказы</h1>
            <div class="order-list" id="orderList"></div>
        </div>
    </div>

    <script>
        const ORDERS_KEY = 'golazo_orders';
        const ADMIN_CRED = { login: 'admin', password: 'admin123' };

        function getOrders() { return JSON.parse(localStorage.getItem(ORDERS_KEY)) || []; }
        function saveOrders(orders) { localStorage.setItem(ORDERS_KEY, JSON.stringify(orders)); }

        function loginAdmin() {
            const login = document.getElementById('adminLogin').value;
            const pass = document.getElementById('adminPass').value;
            if (login === ADMIN_CRED.login && pass === ADMIN_CRED.password) {
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('adminPanel').style.display = 'block';
                sessionStorage.setItem('admin_logged', 'true');
                renderOrders();
            } else {
                alert('Неверные логин или пароль');
            }
        }

        function logoutAdmin() {
            document.getElementById('loginScreen').style.display = 'block';
            document.getElementById('adminPanel').style.display = 'none';
            sessionStorage.removeItem('admin_logged');
        }

        function changeStatus(orderId, newStatus, extra = {}) {
            const orders = getOrders();
            const order = orders.find(o => o.id === orderId);
            if (!order) return;
            Object.assign(order, extra);
            order.status = newStatus;
            saveOrders(orders);
            renderOrders();
        }

        function generateCode(orderId) {
            const code = Math.random().toString(36).substring(2, 8).toUpperCase();
            changeStatus(orderId, 'code_requested', { code });
        }

        function renderOrders() {
            const orders = getOrders();
            const container = document.getElementById('orderList');
            container.innerHTML = orders.length === 0 ? '<p>Нет заказов</p>' : '';
            orders.forEach(order => {
                const div = document.createElement('div');
                div.className = 'order-item';
                div.innerHTML = `
                    <h3>Заказ #${order.id}</h3>
                    <p>Пользователь: ${order.userId} | Почта EA: ${order.email || '—'}</p>
                    <p>Сумма: ${order.total} ₽ | Статус: <strong>${order.status}</strong></p>
                    <p>Товары: ${order.items.map(i => i.amount + ' FC Points').join(', ')}</p>
                    ${order.code ? `<p>Код: <strong>${order.code}</strong></p>` : ''}
                `;
                const actionsDiv = document.createElement('div');
                actionsDiv.className = 'actions';
                if (order.status === 'payment_pending') {
                    actionsDiv.innerHTML += `<button class="approve-btn" onclick="changeStatus('${order.id}', 'paid')">Подтвердить оплату</button>`;
                    actionsDiv.innerHTML += `<button class="reject-btn" onclick="changeStatus('${order.id}', 'cancelled')">Отклонить</button>`;
                }
                if (order.status === 'paid') {
                    actionsDiv.innerHTML += `<button class="generate-code-btn" onclick="generateCode('${order.id}')">Сгенерировать код</button>`;
                }
                if (order.status === 'code_entered') {
                    actionsDiv.innerHTML += `<button class="topup-done-btn" onclick="changeStatus('${order.id}', 'topped_up')">Пополнить (завершить)</button>`;
                }
                if (order.status === 'cancelled' || order.status === 'payment_expired' || order.status === 'topped_up') {
                    actionsDiv.innerHTML += `<span>Действий нет</span>`;
                }
                div.appendChild(actionsDiv);
                container.appendChild(div);
            });
        }

        document.getElementById('loginBtn').addEventListener('click', loginAdmin);
        document.getElementById('logoutBtn').addEventListener('click', logoutAdmin);

        // Проверка сессии при загрузке
        if (sessionStorage.getItem('admin_logged') === 'true') {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('adminPanel').style.display = 'block';
            renderOrders();
        }
    </script>
</body>
</html>
