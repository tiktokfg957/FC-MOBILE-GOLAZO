<script>
    // Данные пакетов
    const packages = [
        { amount: 100, priceOurs: 90, priceGame: 99 },
        { amount: 520, priceOurs: 428, priceGame: 449, popular: true },
        { amount: 1070, priceOurs: 881, priceGame: 889 },
        { amount: 2200, priceOurs: 1761, priceGame: 1790 },
        { amount: 5750, priceOurs: 4400, priceGame: 4690 },
        { amount: 12000, priceOurs: 8780, priceGame: 9490 }
    ];

    // localStorage ключи
    const USERS_KEY = 'golazo_users';
    const CURRENT_USER_KEY = 'golazo_currentUser';
    const CART_KEY = 'golazo_cart';
    const ORDERS_KEY = 'golazo_orders';

    // Функции
    const getUsers = () => JSON.parse(localStorage.getItem(USERS_KEY)) || [];
    const saveUsers = users => localStorage.setItem(USERS_KEY, JSON.stringify(users));
    const getCurrentUser = () => JSON.parse(localStorage.getItem(CURRENT_USER_KEY));
    const setCurrentUser = user => localStorage.setItem(CURRENT_USER_KEY, JSON.stringify(user));
    const clearCurrentUser = () => localStorage.removeItem(CURRENT_USER_KEY);
    const getCart = () => JSON.parse(localStorage.getItem(CART_KEY)) || [];
    const saveCart = cart => localStorage.setItem(CART_KEY, JSON.stringify(cart));
    const getOrders = () => JSON.parse(localStorage.getItem(ORDERS_KEY)) || [];
    const saveOrders = orders => localStorage.setItem(ORDERS_KEY, JSON.stringify(orders));

    // DOM элементы (с проверками)
    const authArea = document.getElementById('authArea');
    const authModal = document.getElementById('authModal');
    const loginForm = document.getElementById('loginForm');
    const registerForm = document.getElementById('registerForm');
    const loginName = document.getElementById('loginName');
    const loginPassword = document.getElementById('loginPassword');
    const loginError = document.getElementById('loginError');
    const regName = document.getElementById('regName');
    const regPassword = document.getElementById('regPassword');
    const regPassword2 = document.getElementById('regPassword2');
    const regNameError = document.getElementById('regNameError');
    const regPassError = document.getElementById('regPassError');
    const regPass2Error = document.getElementById('regPass2Error');
    const tabs = document.querySelectorAll('.modal-tab');

    const packagesContainer = document.getElementById('packagesContainer');
    const cartSection = document.getElementById('cartSection');
    const cartItemsEl = document.getElementById('cartItems');
    const cartTotalEl = document.getElementById('cartTotal');
    const agreeCheckbox = document.getElementById('agreeCheckbox');
    const orderBtn = document.getElementById('orderBtn');
    const orderStatusBlock = document.getElementById('orderStatusBlock');
    const statusTitle = document.getElementById('statusTitle');
    const statusText = document.getElementById('statusText');
    const timerDisplay = document.getElementById('timerDisplay');
    const codeSection = document.getElementById('codeSection');
    const codeInput = document.getElementById('codeInput');
    const submitCodeBtn = document.getElementById('submitCodeBtn');
    const payMockBtn = document.getElementById('payMockBtn');

    const emailModal = document.getElementById('emailModal');
    const emailInput = document.getElementById('emailInput');
    const confirmEmailBtn = document.getElementById('confirmEmailBtn');
    const closeEmailModalBtn = document.getElementById('closeEmailModal');
    const closeAuthModalBtn = document.getElementById('closeAuthModal');
    const ordersBtn = document.getElementById('ordersBtn');

    // Рендер шапки
    function renderAuthArea() {
        const user = getCurrentUser();
        if (user) {
            authArea.innerHTML = `
                <div class="profile-block">
                    <button class="btn-outline" id="authProfileBtn">${user.name}</button>
                    <span class="user-id">ID: ${user.id}</span>
                    <button class="btn-outline" id="ordersBtn">Мои заказы</button>
                    <button class="btn-outline" id="logoutBtn">Выйти</button>
                </div>
                <a href="prices.html" class="btn-primary">Пополнить сейчас</a>
            `;
            document.getElementById('logoutBtn').addEventListener('click', () => {
                clearCurrentUser();
                location.reload();
            });
            document.getElementById('ordersBtn').addEventListener('click', () => {
                alert('История заказов доступна на главной странице.');
            });
        } else {
            authArea.innerHTML = `
                <button class="btn-outline" id="authProfileBtn">Войти</button>
                <a href="prices.html" class="btn-primary">Пополнить сейчас</a>
            `;
            document.getElementById('authProfileBtn').addEventListener('click', openAuthModal);
        }
    }

    // Авторизация
    function openAuthModal() {
        if (!authModal) return;
        authModal.classList.add('active');
        loginForm.reset();
        registerForm.reset();
        hideAuthErrors();
        switchAuthTab('login');
    }
    function closeAuthModal() { if (authModal) authModal.classList.remove('active'); }
    function hideAuthErrors() {
        if (loginError) { loginError.style.display = 'none'; loginError.textContent = ''; }
        if (regNameError) { regNameError.style.display = 'none'; regNameError.textContent = ''; }
        if (regPassError) { regPassError.style.display = 'none'; regPassError.textContent = ''; }
        if (regPass2Error) { regPass2Error.style.display = 'none'; regPass2Error.textContent = ''; }
    }
    function switchAuthTab(tab) {
        tabs.forEach(t => t.classList.remove('active'));
        if (tab === 'login') {
            document.querySelector('[data-tab="login"]').classList.add('active');
            loginForm.style.display = 'block';
            registerForm.style.display = 'none';
        } else {
            document.querySelector('[data-tab="register"]').classList.add('active');
            loginForm.style.display = 'none';
            registerForm.style.display = 'block';
        }
        hideAuthErrors();
    }

    function isValidUsername(name) { return /^[a-zA-Z0-9]+$/.test(name); }

    loginForm?.addEventListener('submit', (e) => {
        e.preventDefault();
        hideAuthErrors();
        const name = loginName.value.trim();
        const pass = loginPassword.value;
        if (!isValidUsername(name)) {
            if (loginError) { loginError.textContent = 'Имя только латиницей'; loginError.style.display = 'block'; }
            return;
        }
        const users = getUsers();
        const user = users.find(u => u.name.toLowerCase() === name.toLowerCase() && u.password === pass);
        if (!user) {
            if (loginError) { loginError.textContent = 'Неверное имя или пароль'; loginError.style.display = 'block'; }
            return;
        }
        setCurrentUser({ name: user.name, id: user.id });
        closeAuthModal();
        renderAuthArea();
    });

    registerForm?.addEventListener('submit', (e) => {
        e.preventDefault();
        hideAuthErrors();
        const name = regName.value.trim();
        const pass = regPassword.value;
        const pass2 = regPassword2.value;
        if (!isValidUsername(name)) {
            if (regNameError) { regNameError.textContent = 'Имя только латиницей'; regNameError.style.display = 'block'; }
            return;
        }
        if (pass.length < 6) {
            if (regPassError) { regPassError.textContent = 'Пароль от 6 символов'; regPassError.style.display = 'block'; }
            return;
        }
        if (pass !== pass2) {
            if (regPass2Error) { regPass2Error.textContent = 'Пароли не совпадают'; regPass2Error.style.display = 'block'; }
            return;
        }
        const users = getUsers();
        if (users.some(u => u.name.toLowerCase() === name.toLowerCase())) {
            if (regNameError) { regNameError.textContent = 'Пользователь уже существует'; regNameError.style.display = 'block'; }
            return;
        }
        const newUser = { name, password: pass, id: 'U' + Math.random().toString(16).slice(2,10).toUpperCase() };
        users.push(newUser);
        saveUsers(users);
        setCurrentUser({ name: newUser.name, id: newUser.id });
        closeAuthModal();
        renderAuthArea();
    });

    if (closeAuthModalBtn) closeAuthModalBtn.addEventListener('click', closeAuthModal);
    window.addEventListener('click', (e) => { if (e.target === authModal) closeAuthModal(); });
    tabs.forEach(tab => tab.addEventListener('click', () => switchAuthTab(tab.dataset.tab)));

    // Каталог
    if (packagesContainer) {
        packages.forEach(pkg => {
            const card = document.createElement('div');
            card.className = 'package-card' + (pkg.popular ? ' popular' : '');
            card.innerHTML = `
                ${pkg.popular ? '<span class="popular-badge">Хит</span>' : ''}
                <div class="package-amount">${pkg.amount.toLocaleString()} FC POINTS</div>
                <div class="package-bonus">При активном x2-бонусе вы получите в 2 раза больше монет.</div>
                <div class="package-prices">
                    <span class="our-price">${pkg.priceOurs} ₽</span>
                    <span class="game-price">${pkg.priceGame} ₽ в игре</span>
                </div>
                <button class="add-to-cart" data-amount="${pkg.amount}" data-price="${pkg.priceOurs}">В корзину</button>
            `;
            packagesContainer.appendChild(card);
        });
    }

    // Корзина
    let cart = getCart();
    updateCartUI();

    document.addEventListener('click', (e) => {
        if (e.target.classList.contains('add-to-cart')) {
            if (!getCurrentUser()) { openAuthModal(); return; }
            const btn = e.target;
            cart.push({ amount: parseInt(btn.dataset.amount), price: parseInt(btn.dataset.price) });
            saveCart(cart);
            updateCartUI();
        }
    });

    function updateCartUI() {
        if (!cartSection) return;
        if (cart.length === 0) { cartSection.style.display = 'none'; return; }
        cartSection.style.display = 'block';
        cartItemsEl.innerHTML = '';
        let total = 0;
        cart.forEach((item, idx) => {
            total += item.price;
            const li = document.createElement('li');
            li.innerHTML = `${item.amount.toLocaleString()} FC Points <span>${item.price} ₽ <button class="remove-item" data-index="${idx}" style="background:none;border:none;color:#FF4D6A;">✕</button></span>`;
            cartItemsEl.appendChild(li);
        });
        cartTotalEl.textContent = total + ' ₽';
        orderBtn.disabled = !agreeCheckbox.checked || !getCurrentUser();
    }

    if (agreeCheckbox) {
        agreeCheckbox.addEventListener('change', () => {
            orderBtn.disabled = !agreeCheckbox.checked || !getCurrentUser();
        });
    }

    if (cartItemsEl) {
        cartItemsEl.addEventListener('click', (e) => {
            if (e.target.classList.contains('remove-item')) {
                cart.splice(parseInt(e.target.dataset.index), 1);
                saveCart(cart);
                updateCartUI();
            }
        });
    }

    // Оформление заказа
    if (orderBtn) {
        orderBtn.addEventListener('click', () => {
            if (!getCurrentUser()) { openAuthModal(); return; }
            emailModal.classList.add('active');
        });
    }

    if (closeEmailModalBtn) closeEmailModalBtn.addEventListener('click', () => emailModal.classList.remove('active'));
    window.addEventListener('click', (e) => { if (e.target === emailModal) emailModal.classList.remove('active'); });

    let currentOrder = null;
    if (confirmEmailBtn) {
        confirmEmailBtn.addEventListener('click', () => {
            const email = emailInput.value.trim();
            if (!email) return alert('Введите почту');
            const user = getCurrentUser();
            const total = cart.reduce((sum, i) => sum + i.price, 0);
            const order = {
                id: 'ORD' + Date.now(),
                userId: user.id,
                email,
                items: [...cart],
                total,
                status: 'payment_pending',
                createdAt: Date.now()
            };
            const orders = getOrders();
            orders.push(order);
            saveOrders(orders);
            cart = [];
            saveCart(cart);
            updateCartUI();
            emailModal.classList.remove('active');
            currentOrder = order;
            showOrderStatus();
        });
    }

    function showOrderStatus() {
        if (!currentOrder || !orderStatusBlock) return;
        orderStatusBlock.style.display = 'block';
        const order = getOrders().find(o => o.id === currentOrder.id);
        if (!order) return;
        currentOrder = order;
        statusTitle.textContent = `Заказ #${order.id}`;
        statusText.textContent = `Сумма: ${order.total} ₽. Статус: ${order.status}`;
        timerDisplay.style.display = 'none';
        payMockBtn.style.display = 'none';
        codeSection.style.display = 'none';

        if (order.status === 'payment_pending') {
            payMockBtn.style.display = 'inline-block';
            startPaymentTimer(order);
        } else if (order.status === 'code_requested') {
            codeSection.style.display = 'flex';
        } else if (order.status === 'paid') {
            statusText.textContent += ' Ожидайте код.';
        } else if (order.status === 'topped_up') {
            statusText.textContent = '✅ Пополнение завершено!';
        } else if (order.status === 'cancelled' || order.status === 'payment_expired') {
            statusText.textContent = '❌ Заказ отменён.';
        }
    }

    function startPaymentTimer(order) {
        const deadline = order.createdAt + 15 * 60 * 1000;
        const timerInterval = setInterval(() => {
            const now = Date.now();
            const diff = deadline - now;
            if (diff <= 0) {
                clearInterval(timerInterval);
                updateOrderStatus(order.id, 'payment_expired');
                showOrderStatus();
            } else {
                const minutes = Math.floor(diff / 60000);
                const seconds = Math.floor((diff % 60000) / 1000);
                if (timerDisplay) {
                    timerDisplay.style.display = 'block';
                    timerDisplay.textContent = `${minutes}:${seconds.toString().padStart(2, '0')}`;
                }
            }
        }, 1000);
    }

    function updateOrderStatus(orderId, newStatus, extra = {}) {
        const orders = getOrders();
        const order = orders.find(o => o.id === orderId);
        if (!order) return;
        Object.assign(order, extra);
        order.status = newStatus;
        saveOrders(orders);
        if (currentOrder && currentOrder.id === orderId) currentOrder = order;
    }

    if (payMockBtn) {
        payMockBtn.addEventListener('click', () => {
            updateOrderStatus(currentOrder.id, 'paid');
            showOrderStatus();
        });
    }

    if (submitCodeBtn) {
        submitCodeBtn.addEventListener('click', () => {
            const code = codeInput.value.trim();
            if (code === currentOrder.code) {
                updateOrderStatus(currentOrder.id, 'code_entered');
                showOrderStatus();
            } else {
                alert('Неверный код');
            }
        });
    }

    // Проверка статуса при загрузке
    window.addEventListener('load', () => {
        const user = getCurrentUser();
        if (user) {
            const orders = getOrders().filter(o => o.userId === user.id && o.status !== 'topped_up' && o.status !== 'cancelled');
            if (orders.length > 0) {
                currentOrder = orders[0];
                showOrderStatus();
            }
        }
    });

    renderAuthArea();
    window.addEventListener('scroll', () => {
        const header = document.querySelector('header');
        if (header) header.classList.toggle('scrolled', window.scrollY > 50);
    });
</script>
