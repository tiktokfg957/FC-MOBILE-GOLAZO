<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FC MOBILE GOLAZO — Цены</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* Общие стили + специфичные для страницы */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #0A0A0A; color: #FFFFFF; }
        .container { max-width: 1400px; margin: 0 auto; padding: 0 24px; }
        header {
            position: sticky; top: 0; z-index: 100;
            background: rgba(10,10,10,0.85); backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(0,255,133,0.15); padding: 18px 0; transition: 0.3s;
        }
        header.scrolled { box-shadow: 0 0 20px rgba(0,255,133,0.3); }
        .header-inner { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 20px; }
        .logo { display: flex; align-items: center; gap: 12px; }
        .logo-icon { font-size: 2.2rem; color: #00FF85; filter: drop-shadow(0 0 8px #00FF85); }
        .logo-text { font-size: 1.8rem; font-weight: 800; color: #FFFFFF; letter-spacing: -0.5px; }
        .logo-text span { color: #00FF85; }
        nav { display: flex; gap: 28px; }
        nav a { color: #AAAAAA; text-decoration: none; font-weight: 500; transition: 0.2s; }
        nav a:hover, nav a.active { color: #00FF85; text-shadow: 0 0 6px #00FF85; }
        .header-btns { display: flex; align-items: center; gap: 12px; }
        .btn-outline { background: transparent; border: 1px solid rgba(255,255,255,0.3); padding: 10px 22px; border-radius: 40px; color: white; cursor: pointer; font-weight: 600; transition: 0.2s; }
        .btn-outline:hover { border-color: #00FF85; color: #00FF85; box-shadow: 0 0 10px rgba(0,255,133,0.3); }
        .btn-primary { background: #00FF85; border: none; padding: 10px 24px; border-radius: 40px; color: #0A0A0A; font-weight: 700; cursor: pointer; transition: 0.2s; }
        .btn-primary:hover { background: #00cc6a; transform: scale(0.98); }

        .catalog { margin: 60px 0; }
        .section-title { font-size: 2.5rem; font-weight: 800; text-align: center; margin-bottom: 60px; color: #FFFFFF; }
        .section-title .green { color: #00FF85; }
        .packages { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 24px; }
        .package-card { background: rgba(20,20,20,0.7); backdrop-filter: blur(8px); border: 1px solid rgba(0,255,133,0.2); border-radius: 28px; padding: 32px 20px; text-align: center; transition: 0.3s; position: relative; overflow: hidden; }
        .package-card:hover { transform: translateY(-8px); border-color: #00FF85; box-shadow: 0 15px 35px rgba(0,255,133,0.25); }
        .package-card.popular { border-color: #00FF85; }
        .popular-badge { position: absolute; top: 16px; right: 16px; background: #00FF85; color: #000; font-size: 0.75rem; font-weight: 700; padding: 4px 12px; border-radius: 20px; }
        .package-amount { font-size: 2rem; font-weight: 800; color: #00FF85; }
        .package-bonus { font-size: 0.9rem; color: #00BFFF; margin-bottom: 8px; }
        .package-prices { margin: 16px 0; }
        .our-price { font-size: 2.2rem; font-weight: 700; color: #FFFFFF; }
        .game-price { font-size: 1rem; color: #AAAAAA; text-decoration: line-through; margin-left: 12px; }
        .add-to-cart { background: #00FF85; color: #0A0A0A; border: none; padding: 10px 28px; border-radius: 40px; font-weight: 700; cursor: pointer; transition: 0.2s; margin-top: 16px; }
        .add-to-cart:hover { background: #00cc6a; }

        .terms { background: rgba(255,255,255,0.03); border-radius: 20px; padding: 20px; margin: 40px 0; }
        .terms label { display: flex; align-items: baseline; gap: 12px; cursor: pointer; color: #AAAAAA; font-size: 0.9rem; }
        .terms input[type="checkbox"] { accent-color: #00FF85; transform: scale(1.2); }
        .important-note { color: #FFB800; font-size: 0.9rem; margin-top: 12px; }

        .cart-summary { background: rgba(20,20,20,0.8); border: 1px solid rgba(0,255,133,0.3); border-radius: 24px; padding: 24px; margin: 30px 0; }
        .cart-summary h3 { font-weight: 700; margin-bottom: 16px; }
        #cartItems { list-style: none; margin-bottom: 16px; }
        #cartItems li { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .total { font-size: 1.4rem; font-weight: 700; color: #00FF85; }
        .order-btn { background: #00FF85; color: #0A0A0A; border: none; padding: 14px 32px; border-radius: 40px; font-weight: 700; font-size: 1.1rem; cursor: pointer; transition: 0.2s; }
        .order-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .modal { /* модалка входа */ }
        /* ... (все стили модалки) */
    </style>
</head>
<body>
    <header id="header">
        <!-- дублируется из index.html -->
    </header>

    <main class="container">
        <section class="catalog">
            <h2 class="section-title">FC Points <span class="green">Пакеты</span></h2>
            <div class="packages" id="packagesContainer"></div>
        </section>

        <div class="terms">
            <label><input type="checkbox" id="agreeCheckbox"> Я понимаю и подтверждаю, что передаю данные для входа добровольно...</label>
            <p class="important-note">⚠️ Не входить в игру до завершения доната.</p>
        </div>

        <div class="cart-summary" id="cartSection" style="display: none;">
            <h3>Ваш заказ</h3>
            <ul id="cartItems"></ul>
            <div class="total" id="cartTotal">0 ₽</div>
            <button class="order-btn" id="orderBtn" disabled>Оформить заказ</button>
        </div>
    </main>

    <footer><!-- как в index --></footer>

    <!-- Модалка входа/регистрации -->
    <div class="modal" id="authModal">
        <!-- полный код модалки -->
    </div>

    <script>
        // packages data
        const packages = [
            { amount: 100, priceOurs: 90, priceGame: 99 },
            { amount: 520, priceOurs: 428, priceGame: 449, popular: true },
            { amount: 1070, priceOurs: 881, priceGame: 889 },
            { amount: 2200, priceOurs: 1761, priceGame: 1790 },
            { amount: 5750, priceOurs: 4400, priceGame: 4690 },
            { amount: 12000, priceOurs: 8780, priceGame: 9490 }
        ];
        // ... (весь код авторизации, корзины, рендера карточек)
    </script>
</body>
</html>
