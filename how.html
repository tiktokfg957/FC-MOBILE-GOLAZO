<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Как это работает</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* общие стили + steps */
        /* ... */
        .steps { margin: 100px 0; display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 32px; }
        .step { text-align: center; }
        .step-number { font-size: 2.5rem; font-weight: 800; color: #00FF85; }
        .step h3 { margin: 12px 0 8px; font-weight: 600; }
        .step p { color: #AAAAAA; }
    </style>
</head>
<body>
    <!-- header как в index -->
    <main class="container">
        <h2 class="section-title">Как <span class="green">работает</span> пополнение</h2>
        <div class="steps">
            <div class="step"><div class="step-number">1</div><h3>Выберите пакет</h3><p>Нажмите на нужный FC Points.</p></div>
            <div class="step"><div class="step-number">2</div><h3>Войдите в аккаунт</h3><p>Укажите ваш EA ID.</p></div>
            <div class="step"><div class="step-number">3</div><h3>Оплатите</h3><p>Через удобный способ.</p></div>
            <div class="step"><div class="step-number">4</div><h3>Получите FC Points</h3><p>В течение 10–25 мин.</p></div>
        </div>
    </main>
    <footer><!-- как в index --></footer>
    <script>
        // header рендер авторизации
        // sticky
    </script>
</body>
</html>
