<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FAQ</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* общие стили + faq */
        .faq-item { border-bottom: 1px solid rgba(255,255,255,0.1); padding: 20px 0; }
        .faq-question { font-weight: 600; cursor: pointer; transition: 0.2s; }
        .faq-question:hover { color: #00FF85; }
        .faq-answer { color: #AAAAAA; margin-top: 12px; display: none; }
        .faq-item.open .faq-answer { display: block; }
    </style>
</head>
<body>
    <!-- header -->
    <main class="container">
        <h2 class="section-title">FAQ</h2>
        <div class="faq-item">
            <div class="faq-question">Сколько времени занимает пополнение?</div>
            <div class="faq-answer">Обычно 10–25 минут.</div>
        </div>
        <div class="faq-item">
            <div class="faq-question">Что нужно для заказа?</div>
            <div class="faq-answer">Аккаунт EA, привязанный к FC Mobile.</div>
        </div>
        <!-- ещё вопросы -->
    </main>
    <footer><!-- --></footer>
    <script>
        // faq toggle
        document.querySelectorAll('.faq-question').forEach(q => {
            q.addEventListener('click', () => q.parentElement.classList.toggle('open'));
        });
    </script>
</body>
</html>
